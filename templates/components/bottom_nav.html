{% with request.resolver_match.view_name as active_route %}
<div class="btm-nav md:hidden border-t border-base-200 z-50 bg-base-100/95 backdrop-blur-md shadow-2xl py-1 sticky bottom-0">
    <!-- Home / Scheduled -->
    <a href="{% url 'matches:dashboard' %}" class="transition-all duration-200 {% if 'matches' in active_route and request.GET.filter != 'live' and request.GET.filter != 'finished' %}active text-primary font-bold bg-base-200/40{% else %}opacity-60 text-base-content hover:opacity-100{% endif %}">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <span class="btm-nav-label text-[10px] tracking-wide mt-1">Home</span>
    </a>

    <!-- Live Matches -->
    <a href="{% url 'matches:dashboard' %}?filter=live" class="transition-all duration-200 {% if 'matches' in active_route and request.GET.filter == 'live' %}active text-emerald-400 font-bold bg-base-200/40{% else %}opacity-60 text-base-content hover:opacity-100{% endif %}">
        <span class="relative flex">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
            {% if request.GET.filter != 'live' %}
            <span class="absolute -top-1 -right-1 flex h-2 w-2">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
            </span>
            {% endif %}
        </span>
        <span class="btm-nav-label text-[10px] tracking-wide mt-1">Live</span>
    </a>

    <!-- Predictions / Betting Tips -->
    <a href="{% url 'betting:dashboard' %}" class="transition-all duration-200 {% if 'betting' in active_route %}active text-cyan-400 font-bold bg-base-200/40{% else %}opacity-60 text-base-content hover:opacity-100{% endif %}">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
        </svg>
        <span class="btm-nav-label text-[10px] tracking-wide mt-1">Predictions</span>
    </a>

    <!-- AI Assistant -->
    <a href="{% url 'ai_engine:chat' %}" class="transition-all duration-200 {% if 'ai_engine' in active_route %}active text-purple-400 font-bold bg-base-200/40{% else %}opacity-60 text-base-content hover:opacity-100{% endif %}">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
        </svg>
        <span class="btm-nav-label text-[10px] tracking-wide mt-1">AI Voice</span>
    </a>

    <!-- Profile -->
    <a href="{% url 'users:profile' %}" class="transition-all duration-200 {% if 'users:profile' in active_route or 'profile' in active_route %}active text-amber-400 font-bold bg-base-200/40{% else %}opacity-60 text-base-content hover:opacity-100{% endif %}">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        <span class="btm-nav-label text-[10px] tracking-wide mt-1">Profile</span>
    </a>
</div>
{% endwith %}
