{% if type == 'match_list' %}
    <div class="space-y-4 animate-pulse">
        {% for i in "123" %}
            <div class="card bg-base-100 border border-base-200 shadow-sm p-5 space-y-4">
                <div class="flex justify-between items-center">
                    <div class="h-4 w-24 bg-base-300 rounded"></div>
                    <div class="h-4 w-16 bg-base-300 rounded"></div>
                </div>
                <div class="flex justify-between items-center py-2">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-base-300"></div>
                        <div class="h-4 w-32 bg-base-300 rounded"></div>
                    </div>
                    <div class="h-6 w-12 bg-base-300 rounded"></div>
                </div>
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-base-300"></div>
                        <div class="h-4 w-32 bg-base-300 rounded"></div>
                    </div>
                    <div class="h-6 w-12 bg-base-300 rounded"></div>
                </div>
                <div class="border-t border-base-200 pt-3 flex justify-between">
                    <div class="h-8 w-28 bg-base-300 rounded-lg"></div>
                    <div class="h-8 w-20 bg-base-300 rounded-lg"></div>
                </div>
            </div>
        {% endfor %}
    </div>
{% elif type == 'prediction' %}
    <div class="animate-pulse space-y-6">
        <div class="card bg-base-100 border border-base-200 p-6 space-y-4">
            <div class="h-6 w-48 bg-base-300 rounded"></div>
            <div class="grid grid-cols-3 gap-4">
                <div class="h-24 bg-base-300 rounded-xl"></div>
                <div class="h-24 bg-base-300 rounded-xl"></div>
                <div class="h-24 bg-base-300 rounded-xl"></div>
            </div>
        </div>
        <div class="card bg-base-100 border border-base-200 p-6 space-y-4">
            <div class="h-6 w-32 bg-base-300 rounded"></div>
            <div class="h-4 w-full bg-base-300 rounded"></div>
            <div class="h-4 w-5/6 bg-base-300 rounded"></div>
            <div class="h-4 w-2/3 bg-base-300 rounded"></div>
        </div>
    </div>
{% elif type == 'chat' %}
    <div class="flex items-start gap-3 animate-pulse">
        <div class="w-8 h-8 rounded-full bg-base-300"></div>
        <div class="space-y-2 flex-1">
            <div class="h-4 w-1/4 bg-base-300 rounded"></div>
            <div class="h-10 w-2/3 bg-base-300 rounded-2xl"></div>
        </div>
    </div>
{% else %}
    <!-- Default Card Skeleton -->
    <div class="card bg-base-100 border border-base-200 p-6 space-y-4 animate-pulse">
        <div class="h-4 w-2/3 bg-base-300 rounded"></div>
        <div class="h-12 w-full bg-base-300 rounded-lg"></div>
        <div class="h-4 w-1/2 bg-base-300 rounded"></div>
    </div>
{% endif %}
