{% with request.resolver_match.view_name as active_route %}
<aside class="w-64 bg-base-100 border-r border-base-200 hidden md:flex flex-col justify-between py-6">
    <div class="space-y-6 px-4">
        <!-- Section: Features -->
        <div>
            <p class="px-4 text-xs font-semibold text-neutral-content/40 uppercase tracking-widest mb-3">Core Hub</p>
            <ul class="menu menu-md w-full p-0 space-y-1">
                <li>
                    <a href="{% url 'matches:dashboard' %}" class="flex items-center gap-3 py-3 px-4 rounded-xl transition-all duration-200 {% if 'matches' in active_route %}active bg-primary text-primary-content shadow-lg shadow-primary/15 font-semibold{% else %}hover:bg-base-200{% endif %}">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                        <span>Match Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="{% url 'betting:dashboard' %}" class="flex items-center gap-3 py-3 px-4 rounded-xl transition-all duration-200 {% if 'betting' in active_route %}active bg-primary text-primary-content shadow-lg shadow-primary/15 font-semibold{% else %}hover:bg-base-200{% endif %}">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                        </svg>
                        <span>Betting Tips</span>
                    </a>
                </li>
                <li>
                    <a href="{% url 'ai_engine:chat' %}" class="flex items-center gap-3 py-3 px-4 rounded-xl transition-all duration-200 {% if 'ai_engine' in active_route %}active bg-primary text-primary-content shadow-lg shadow-primary/15 font-semibold{% else %}hover:bg-base-200{% endif %}">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                        </svg>
                        <span>AI Assistant</span>
                    </a>
                </li>
            </ul>
        </div>

        <!-- Section: Systems -->
        <div>
            <p class="px-4 text-xs font-semibold text-neutral-content/40 uppercase tracking-widest mb-3">Monitoring</p>
            <ul class="menu menu-md w-full p-0 space-y-1">
                <li>
                    <a href="{% url 'analytics:dashboard' %}" class="flex items-center gap-3 py-3 px-4 rounded-xl transition-all duration-200 {% if 'analytics' in active_route %}active bg-primary text-primary-content shadow-lg shadow-primary/15 font-semibold{% else %}hover:bg-base-200{% endif %}">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                        </svg>
                        <span>AI Analytics</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <!-- Sidebar Footer -->
    <div class="px-6 border-t border-base-200 pt-6">
        <div class="card bg-base-200 border border-base-300 shadow-sm p-4">
            <div class="flex items-center gap-2">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                <span class="text-xs font-semibold opacity-70">AI Models Online</span>
            </div>
            <p class="text-[10px] opacity-40 mt-1">Accuracy refreshed live via Celery.</p>
        </div>
    </div>
</aside>
{% endwith %}
