{% if matches %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        {% for match in matches %}
            {% include 'matches/partials/match_card.html' with match=match %}
        {% endfor %}
    </div>
{% else %}
    <div class="card bg-base-100 border border-base-200 p-12 text-center text-base-content/60 shadow-sm rounded-2xl">
        <span class="text-5xl mb-3">📅</span>
        <h4 class="font-bold text-lg">No fixtures found</h4>
        <p class="text-sm opacity-60 max-w-md mx-auto mt-1">
            There are no matches of style "{{ filter_type }}" matching the selected criteria in our pipeline right now.
        </p>
    </div>
{% endif %}
