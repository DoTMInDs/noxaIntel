{% if error %}
    <div class="alert alert-error text-xs py-2 px-3.5 rounded-xl shadow-md my-2">
        <span>⚠️ {{ error }}</span>
    </div>
{% else %}
    <!-- User Message -->
    {% if user_message %}
        <div class="chat chat-end animate-fade-in">
            <div class="chat-image avatar placeholder">
                <div class="bg-neutral-focus text-neutral-content rounded-full w-8 border border-neutral-content/10 shadow-sm flex items-center justify-center">
                    <span class="text-[10px] font-bold">{{ user.username|slice:":2"|upper }}</span>
                </div>
            </div>
            <div class="chat-header opacity-40 text-[9px] mb-0.5">You</div>
            <div class="chat-bubble chat-bubble-primary text-xs font-medium max-w-lg leading-relaxed shadow-sm">
                {{ user_message }}
            </div>
        </div>
    {% endif %}

    <!-- AI Response -->
    {% if ai_response %}
        <div class="chat chat-start animate-fade-in mt-2">
            <div class="chat-image avatar placeholder">
                <div class="bg-primary/10 border border-primary/20 rounded-full w-8 flex items-center justify-center shadow-sm">
                    <span class="text-sm">🤖</span>
                </div>
            </div>
            <div class="chat-header opacity-40 text-[9px] mb-0.5">NoxaIntel AI</div>
            <div class="chat-bubble chat-bubble-neutral text-xs max-w-lg leading-relaxed shadow-sm bg-base-200 border border-base-300">
                {{ ai_response|linebreaksbr }}
            </div>
        </div>
        <script>
            if (window.speakResponse && document.getElementById('tts-toggle') && document.getElementById('tts-toggle').checked) {
                // Strip emoji and format-specific characters from synthesized text
                let cleanText = `{{ ai_response|escapejs }}`.replace(/[🤖⚽🔒👑⚡⭐🟢📅•]/g, '').replace(/\\n/g, ' ');
                window.speakResponse(cleanText);
            }
        </script>
    {% endif %}
{% endif %}
